<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="green3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06d6a0"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="520" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1100" height="2" fill="url(#green3)"/>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="16" font-weight="700" fill="#f0fdf4" letter-spacing="3">GRITS ARCHITECTURE</text>
  <text x="550" y="52" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#64748b">Each pillar is enforced across every implementation layer</text>

  <!-- Matrix origin -->
  <g transform="translate(50, 72)">

    <!-- Column headers: PILLARS -->
    <text x="160" y="0" font-family="'SF Mono',monospace" font-size="9" fill="#475569" letter-spacing="2">PILLARS (what you enforce)</text>

    <!-- G R I T S column headers -->
    <g transform="translate(160, 10)">
      <rect x="0" y="0" width="140" height="32" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
      <text x="12" y="22" font-family="'SF Mono',monospace" font-size="20" font-weight="800" fill="#10b981">G</text>
      <text x="36" y="20" font-family="'SF Mono',monospace" font-size="9" fill="#6ee7b7">GOVERNANCE</text>

      <rect x="150" y="0" width="140" height="32" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
      <text x="162" y="22" font-family="'SF Mono',monospace" font-size="20" font-weight="800" fill="#f97316">R</text>
      <text x="182" y="20" font-family="'SF Mono',monospace" font-size="9" fill="#fdba74">RISK</text>

      <rect x="300" y="0" width="140" height="32" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
      <text x="312" y="22" font-family="'SF Mono',monospace" font-size="20" font-weight="800" fill="#3b82f6">I</text>
      <text x="330" y="20" font-family="'SF Mono',monospace" font-size="9" fill="#93c5fd">INTEGRITY</text>

      <rect x="450" y="0" width="140" height="32" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
      <text x="462" y="22" font-family="'SF Mono',monospace" font-size="20" font-weight="800" fill="#8b5cf6">T</text>
      <text x="480" y="20" font-family="'SF Mono',monospace" font-size="9" fill="#c4b5fd">TRUST</text>

      <rect x="600" y="0" width="140" height="32" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
      <text x="612" y="22" font-family="'SF Mono',monospace" font-size="20" font-weight="800" fill="#ef4444">S</text>
      <text x="630" y="20" font-family="'SF Mono',monospace" font-size="9" fill="#fca5a5">SECURITY</text>
    </g>

    <!-- Row label: LAYERS -->
    <text x="0" y="60" font-family="'SF Mono',monospace" font-size="9" fill="#475569" letter-spacing="2" transform="rotate(-90, 10, 200)">LAYERS (how you implement)</text>

    <!-- Row headers + matrix cells -->
    <!-- L1 NETWORK -->
    <g transform="translate(28, 52)">
      <rect x="0" y="0" width="124" height="52" rx="3" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
      <text x="8" y="18" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#fca5a5">L1 NETWORK</text>
      <text x="8" y="32" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">Firewall, egress,</text>
      <text x="8" y="43" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">TLS, binary scope</text>

      <!-- Matrix cells for L1 -->
      <g transform="translate(132, 0)">
        <rect x="0" y="0" width="140" height="52" rx="2" fill="#10b981" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="8" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Who approved</text>
        <text x="8" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">this egress rule?</text>

        <rect x="150" y="0" width="140" height="52" rx="2" fill="#f97316" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="158" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">What if firewall</text>
        <text x="158" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">is misconfigured?</text>

        <rect x="300" y="0" width="140" height="52" rx="2" fill="#3b82f6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="308" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Are rules tamper-</text>
        <text x="308" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">proof and audited?</text>

        <rect x="450" y="0" width="140" height="52" rx="2" fill="#8b5cf6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="458" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Can you verify</text>
        <text x="458" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">enforcement state?</text>

        <rect x="600" y="0" width="140" height="52" rx="2" fill="#ef4444" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="608" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Default-deny?</text>
        <text x="608" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">TLS everywhere?</text>
      </g>
    </g>

    <!-- L2 OPERATOR -->
    <g transform="translate(28, 110)">
      <rect x="0" y="0" width="124" height="52" rx="3" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
      <text x="8" y="18" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#fdba74">L2 OPERATOR</text>
      <text x="8" y="32" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">Identity, DM policy,</text>
      <text x="8" y="43" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">RBAC, allowlists</text>

      <g transform="translate(132, 0)">
        <rect x="0" y="0" width="140" height="52" rx="2" fill="#10b981" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="8" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Who manages</text>
        <text x="8" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">operator access?</text>

        <rect x="150" y="0" width="140" height="52" rx="2" fill="#f97316" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="158" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Unauthorized user</text>
        <text x="158" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">commands agent?</text>

        <rect x="300" y="0" width="140" height="52" rx="2" fill="#3b82f6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="308" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Allowlists match</text>
        <text x="308" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">actual identities?</text>

        <rect x="450" y="0" width="140" height="52" rx="2" fill="#8b5cf6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="458" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">MFA? Verified</text>
        <text x="458" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">identity chain?</text>

        <rect x="600" y="0" width="140" height="52" rx="2" fill="#ef4444" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="608" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Reject permissive</text>
        <text x="608" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">DM/group defaults?</text>
      </g>
    </g>

    <!-- L3 APPLICATION -->
    <g transform="translate(28, 168)">
      <rect x="0" y="0" width="124" height="52" rx="3" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1" stroke-opacity="0.3"/>
      <text x="8" y="18" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#fde047">L3 APPLICATION</text>
      <text x="8" y="32" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">Tools, sandbox,</text>
      <text x="8" y="43" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">filesystem, exec</text>

      <g transform="translate(132, 0)">
        <rect x="0" y="0" width="140" height="52" rx="2" fill="#10b981" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="8" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Who approved</text>
        <text x="8" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">this tool profile?</text>

        <rect x="150" y="0" width="140" height="52" rx="2" fill="#f97316" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="158" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Agent executes</text>
        <text x="158" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">rogue code?</text>

        <rect x="300" y="0" width="140" height="52" rx="2" fill="#3b82f6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="308" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Sandbox actually</text>
        <text x="308" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">isolating writes?</text>

        <rect x="450" y="0" width="140" height="52" rx="2" fill="#8b5cf6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="458" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Tool deny list</text>
        <text x="458" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">not bypassable?</text>

        <rect x="600" y="0" width="140" height="52" rx="2" fill="#ef4444" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="608" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Deny-by-default</text>
        <text x="608" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">tool policy?</text>
      </g>
    </g>

    <!-- L4 OS/SECRETS -->
    <g transform="translate(28, 226)">
      <rect x="0" y="0" width="124" height="52" rx="3" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
      <text x="8" y="18" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#93c5fd">L4 OS/SECRETS</text>
      <text x="8" y="32" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">Credentials, keys,</text>
      <text x="8" y="43" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">Landlock, seccomp</text>

      <g transform="translate(132, 0)">
        <rect x="0" y="0" width="140" height="52" rx="2" fill="#10b981" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="8" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Key rotation</text>
        <text x="8" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">policy enforced?</text>

        <rect x="150" y="0" width="140" height="52" rx="2" fill="#f97316" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="158" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Credential leak</text>
        <text x="158" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">blast radius?</text>

        <rect x="300" y="0" width="140" height="52" rx="2" fill="#3b82f6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="308" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Keys off filesystem</text>
        <text x="308" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">and immutable?</text>

        <rect x="450" y="0" width="140" height="52" rx="2" fill="#8b5cf6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="458" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Kernel enforced?</text>
        <text x="458" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Landlock + seccomp?</text>

        <rect x="600" y="0" width="140" height="52" rx="2" fill="#ef4444" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="608" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">No plaintext keys?</text>
        <text x="608" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">600 perms? Root?</text>
      </g>
    </g>

    <!-- L5 FINANCIAL -->
    <g transform="translate(28, 284)">
      <rect x="0" y="0" width="124" height="52" rx="3" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
      <text x="8" y="18" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#c4b5fd">L5 FINANCIAL</text>
      <text x="8" y="32" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">Cost limits, local</text>
      <text x="8" y="43" font-family="-apple-system,sans-serif" font-size="8" fill="#64748b">fallback, budgets</text>

      <g transform="translate(132, 0)">
        <rect x="0" y="0" width="140" height="52" rx="2" fill="#10b981" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="8" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Budget approvals</text>
        <text x="8" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">and hard caps?</text>

        <rect x="150" y="0" width="140" height="52" rx="2" fill="#f97316" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="158" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Idle loop drains</text>
        <text x="158" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">entire API budget?</text>

        <rect x="300" y="0" width="140" height="52" rx="2" fill="#3b82f6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="308" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Spend tracking</text>
        <text x="308" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">accurate?</text>

        <rect x="450" y="0" width="140" height="52" rx="2" fill="#8b5cf6" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="458" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Auto-topup off?</text>
        <text x="458" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Local fallback?</text>

        <rect x="600" y="0" width="140" height="52" rx="2" fill="#ef4444" opacity="0.06" stroke="#1e293b" stroke-width="0.5"/>
        <text x="608" y="18" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">Hard spend limit</text>
        <text x="608" y="30" font-family="-apple-system,sans-serif" font-size="8" fill="#94a3b8">enforced at API?</text>
      </g>
    </g>

  </g>

  <!-- Bottom: scanner + consulting callout -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="480" height="50" rx="4" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
    <text x="16" y="20" font-family="'SF Mono',monospace" font-size="10" font-weight="600" fill="#6ee7b7">GRITS SCANNERS</text>
    <text x="16" y="36" font-family="-apple-system,sans-serif" font-size="9" fill="#94a3b8">Automated checks across all 25 matrix cells. Host-level. Config-level. Run in CI/CD.</text>

    <rect x="500" y="0" width="480" height="50" rx="4" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="516" y="20" font-family="'SF Mono',monospace" font-size="10" font-weight="600" fill="#c4b5fd">X SCALE AI CONSULTING</text>
    <text x="516" y="36" font-family="-apple-system,sans-serif" font-size="9" fill="#94a3b8">VLAN isolation, network segmentation, DMZ design, enterprise governance. xscaleai.com</text>
  </g>

  <!-- Footer -->
  <text x="550" y="500" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#475569">GRITS v0.3.0 by X Scale AI | github.com/X-Scale-AI/GRITS | xscaleai.com</text>

  <rect x="0" y="518" width="1100" height="2" fill="url(#green3)"/>
</svg>
