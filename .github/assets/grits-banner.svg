<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050811"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06d6a0"/>
    </linearGradient>
    <linearGradient id="warn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#6ee7b7" stroke-width="0.5">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="900" y1="0" x2="900" y2="340"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="340" fill="url(#accent)" rx="2"/>

  <!-- Main title -->
  <text x="56" y="88" font-family="'SF Mono', 'Fira Code', monospace" font-size="48"
        font-weight="700" fill="#f0fdf4" letter-spacing="-1">GRITS</text>

  <!-- Subtitle -->
  <text x="58" y="118" font-family="'SF Mono', 'Fira Code', monospace" font-size="15"
        fill="#6ee7b7" letter-spacing="4" opacity="0.9">AGENT SCANNER</text>

  <!-- Tagline -->
  <text x="58" y="158" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18"
        fill="#94a3b8">Run your AI agent. Keep control of your machine,</text>
  <text x="58" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18"
        fill="#94a3b8">your keys, and your cloud bill.</text>

  <!-- Divider -->
  <line x1="56" y1="208" x2="560" y2="208" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>

  <!-- Stats row -->
  <text x="58" y="238" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
        fill="#6ee7b7">20 checks</text>
  <text x="145" y="238" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
        fill="#475569">|</text>
  <text x="158" y="238" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
        fill="#6ee7b7">5 security layers</text>
  <text x="300" y="238" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
        fill="#475569">|</text>
  <text x="313" y="238" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
        fill="#6ee7b7">macOS + Linux</text>
  <text x="440" y="238" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
        fill="#475569">|</text>
  <text x="453" y="238" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
        fill="#6ee7b7">zero dependencies</text>

  <!-- CTA buttons -->
  <rect x="58" y="268" width="244" height="42" rx="6" fill="#10b981" opacity="0.12"/>
  <rect x="58" y="268" width="244" height="42" rx="6" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <text x="180" y="295" font-family="'SF Mono', 'Fira Code', monospace" font-size="14"
        fill="#6ee7b7" text-anchor="middle" font-weight="600">./grits-agent-scanner</text>

  <rect x="316" y="268" width="232" height="42" rx="6" fill="#f59e0b" opacity="0.10"/>
  <rect x="316" y="268" width="232" height="42" rx="6" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="432" y="295" font-family="'SF Mono', 'Fira Code', monospace" font-size="14"
        fill="#fbbf24" text-anchor="middle" font-weight="600">./grits-agent-secure</text>

  <!-- Right panel: terminal mockup -->
  <rect x="660" y="30" width="510" height="280" rx="10" fill="#0a0f1a" stroke="#1e293b" stroke-width="1"/>

  <!-- Terminal chrome -->
  <rect x="660" y="30" width="510" height="34" rx="10" fill="#111827"/>
  <rect x="660" y="52" width="510" height="12" fill="#111827"/>
  <circle cx="688" cy="47" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="708" cy="47" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="728" cy="47" r="6" fill="#10b981" opacity="0.8"/>
  <text x="843" y="51" font-family="'SF Mono', 'Fira Code', monospace" font-size="11"
        fill="#475569" text-anchor="middle">grits-agent-scanner</text>

  <!-- Terminal content -->
  <text x="680" y="88" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#64748b">$ ./grits-agent-scanner</text>
  <text x="680" y="108" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#475569">Platform  MACOS  |  Agent  OpenClaw</text>

  <text x="680" y="128" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#6b7280">-- L1 NETWORK --</text>
  <text x="680" y="144" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#ef4444">[FAIL]</text>
  <text x="726" y="144" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#cbd5e1"> OC01  No firewall active.</text>
  <text x="680" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#10b981">[PASS]</text>
  <text x="726" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#cbd5e1"> OC02  Gateway auth configured.</text>

  <text x="680" y="180" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#6b7280">-- L3 APPLICATION --</text>
  <text x="680" y="196" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#ef4444">[FAIL]</text>
  <text x="726" y="196" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#cbd5e1"> OC06  Full tool access enabled.</text>
  <text x="680" y="212" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#10b981">[PASS]</text>
  <text x="726" y="212" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#cbd5e1"> OC09  Sandbox mode active.</text>

  <line x1="680" y1="228" x2="1150" y2="228" stroke="#1e293b" stroke-width="1"/>
  <text x="680" y="246" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#94a3b8">SCORE  14/20  </text>
  <rect x="775" y="236" width="120" height="10" rx="2" fill="#1e293b"/>
  <rect x="775" y="236" width="84" height="10" rx="2" fill="url(#accent)" opacity="0.8"/>
  <text x="904" y="246" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#6ee7b7">70%  Progressing</text>

  <text x="680" y="268" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#f59e0b">AUTO-FIXABLE (4)  ./grits-agent-secure</text>
  <text x="680" y="286" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5" fill="#ef4444">NEEDS EXPERT (2)  xscaleai.com/consult</text>

  <!-- Attribution -->
  <text x="600" y="326" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11"
        fill="#334155" text-anchor="middle">GRITS v0.3.0  |  Built by X Scale AI  |  Apache 2.0  |  xscaleai.com</text>
</svg>
